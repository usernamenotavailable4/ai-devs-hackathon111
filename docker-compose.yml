version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: fi-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    container_name: fi-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fraud_investigator}
      POSTGRES_USER: ${POSTGRES_USER:-fraud_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: fi-pubsub-emulator
    command: >
      gcloud beta emulators pubsub start
      --project=fraud-investigator-local
      --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"

  mock-sanctions-api:
    build: ./services/mock_sanctions_api
    container_name: fi-mock-sanctions-api
    ports:
      - "8010:8010"

  pii-masking:
    build: ./services/pii_masking
    container_name: fi-pii-masking
    ports:
      - "8020:8020"

  audit-log:
    build: ./services/audit_log
    container_name: fi-audit-log
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-fraud_investigator}
      - POSTGRES_USER=${POSTGRES_USER:-fraud_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme_local_dev}
    ports:
      - "8030:8030"
    depends_on:
      - postgres

  api-gateway:
    build: ./services/api_gateway
    container_name: fi-api-gateway
    env_file: .env
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - AUDIT_LOG_URL=http://audit-log:8030
      - PII_MASKING_URL=http://pii-masking:8020
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_HOST=postgres
    ports:
      - "8000:8000"
    depends_on:
      - pubsub-emulator
      - audit-log
      - pii-masking

  orchestrator:
    build: ./services/orchestrator
    container_name: fi-orchestrator
    env_file: .env
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - AUDIT_LOG_URL=http://audit-log:8030
    depends_on:
      - pubsub-emulator
      - audit-log

  agent-kyc-retriever:
    build:
      context: .
      dockerfile: services/agents/kyc_retriever/Dockerfile
    container_name: fi-agent-kyc-retriever
    env_file: .env
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - SANCTIONS_API_URL=http://mock-sanctions-api:8010
    depends_on:
      - pubsub-emulator
      - mock-sanctions-api

  agent-transaction-analyzer:
    build:
      context: .
      dockerfile: services/agents/transaction_analyzer/Dockerfile
    container_name: fi-agent-transaction-analyzer
    env_file: .env
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - POSTGRES_HOST=postgres
    depends_on:
      - pubsub-emulator
      - postgres

  agent-fraud-case-search:
    build:
      context: .
      dockerfile: services/agents/fraud_case_search/Dockerfile
    container_name: fi-agent-fraud-case-search
    env_file: .env
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - pubsub-emulator
      - qdrant

  agent-report-generator:
    build:
      context: .
      dockerfile: services/agents/report_generator/Dockerfile
    container_name: fi-agent-report-generator
    env_file: .env
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - AUDIT_LOG_URL=http://audit-log:8030
    depends_on:
      - pubsub-emulator
      - audit-log

  frontend:
    build: ./frontend
    container_name: fi-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - api-gateway

volumes:
  qdrant_storage:
  pgdata:
